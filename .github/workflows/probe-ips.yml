name: probe-ips
# Do 4 concurrent jobs get DISTINCT egress IPs? If yes, we can harvest in parallel
# (each IP under the ~60/min limit) for a ~4-8x speedup. If they share an IP, must stay serial.
on:
  workflow_dispatch:
jobs:
  ip:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        n: [1, 2, 3, 4]
    steps:
      - run: echo "job ${{ matrix.n }} egress IP: $(curl -s https://api.ipify.org)"
