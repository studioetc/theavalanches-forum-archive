name: probe
# One-off: confirm whether GitHub Actions (Azure IPs) can reach the Wayback replay endpoint at all.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Egress IP
        run: curl -s https://api.ipify.org; echo
      - name: CDX API reachability
        run: |
          curl -s -o /dev/null -w "CDX: code=%{http_code} time=%{time_total}s\n" \
            "https://web.archive.org/cdx/search/cdx?url=theavalanches.com/forum/index.php&limit=1" || echo "CDX FAILED: $?"
      - name: Replay id_ endpoint reachability (3 tries)
        run: |
          for i in 1 2 3; do
            curl -sS -L -o /dev/null -w "replay$i: code=%{http_code} time=%{time_total}s\n" \
              "https://web.archive.org/web/20071017072031id_/http://www.theavalanches.com/forum/index.php" \
              || echo "replay$i FAILED exit=$?"
            sleep 3
          done
